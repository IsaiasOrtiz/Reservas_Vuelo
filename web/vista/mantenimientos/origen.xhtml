<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./../../plantilla/plantilla.xhtml">

            <ui:define name="content">
                <h3>LISTADO DE ORIGEN</h3>
                    <h:form>
                        <p:commandButton value="Agregar Origen" actionListener="#{origenControl.limpiarOrigen()}" oncomplete="PF('dialogoAgregar').show();" update=":formAgregar"/>
                        <p:separator/>
                    </h:form>
                    <h:form id="formListado">
                        <p:dataTable id="tablaOrigens" paginator="true" paginatorPosition="bottom" rows="10" var="origen" value="#{origenControl.listaOrigenes}" emptyMessage="No existen origens">
                            <p:column headerText="Id:">
                                <h:outputText value="#{origen.idOrigen}" />
                            </p:column>
                            <p:column headerText="Pais">
                                <h:outputText value="#{origen.pais}" />
                            </p:column>
                             <p:column headerText="Ciudad">
                                 <h:outputText value="#{origen.ciudad}" />
                            </p:column>
                             <p:column headerText="Aeropuerto">
                                 <h:outputText value="#{origen.aeropuerto}" />
                            </p:column>
                            
                            <p:column headerText="MODIFICAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-pencil" title="Modificar" oncomplete="PF('dialogoModificar').show();" update=":formModificar">
                                    <f:setPropertyActionListener target="#{origenControl.origen}" value="#{origen}"/>
                                </p:commandButton>
                            </p:column>
                            <p:column headerText="ELIMINAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-trash" title="Eliminar" oncomplete="PF('dialogoEliminar').show();" update=":formEliminar">
                                    <f:setPropertyActionListener target="#{origenControl.origen}" value="#{origen}"/>
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </h:form>

                    <h:form id="formAgregar">
                        <p:dialog id="dlgAgregar" header="Agregar Origen" widgetVar="dialogoAgregar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Pais:"/>
                                <p:inputText value="#{origenControl.origen.pais}"/>
                                <p:outputLabel value="Ciudad::"/>
                                <p:inputText value="#{origenControl.origen.ciudad}"/>
                                <p:outputLabel value="Aeropuerto:"/>
                                <p:inputText value="#{origenControl.origen.aeropuerto}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{origenControl.agregarOrigen()}" update=":formListado:tablaOrigens" oncomplete="PF('dialogoAgregar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoAgregar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formModificar">
                        <p:dialog id="dlgModificar" header="Modificar Origen" widgetVar="dialogoModificar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Pais:"/>
                                <p:inputText value="#{origenControl.origen.pais}"/>
                                <p:outputLabel value="Ciudad::"/>
                                <p:inputText value="#{origenControl.origen.ciudad}"/>
                                <p:outputLabel value="Aeropuerto:"/>
                                <p:inputText value="#{origenControl.origen.aeropuerto}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{origenControl.modificarOrigen()}" update=":formListado:tablaOrigens" oncomplete="PF('dialogoModificar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoModificar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formEliminar">
                        <p:dialog id="dlgEliminar" header="Eliminar Origen" widgetVar="dialogoEliminar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <h:outputText value="Desea eliminar este registro?"/>
                            <p:commandButton  value="Si" actionListener="#{origenControl.eliminarOrigen()}" update=":formListado:tablaOrigens" oncomplete="PF('dialogoEliminar').hide();"/>
                            <p:commandButton  value="No" onclick="PF('dialogoEliminar').hide();"/>
                        </p:dialog>
                    </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
