<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./../../plantilla/plantilla.xhtml">

            <ui:define name="content">
                <h3>LISTADO DE CLASE</h3>
                    <h:form>
                        <p:commandButton value="Agregar Clase" actionListener="#{claseControl.limpiarClase()}" oncomplete="PF('dialogoAgregar').show();" update=":formAgregar"/>
                        <p:separator/>
                    </h:form>
                    <h:form id="formListado">
                        <p:dataTable id="tablaClases" paginator="true" paginatorPosition="bottom" rows="10" var="clase" value="#{claseControl.listaClases}" emptyMessage="No existen clases">
                            <p:column headerText="Id:">
                                <h:outputText value="#{clase.idClase}" />
                            </p:column>
                            <p:column headerText="Tipo">
                                <h:outputText value="#{clase.tipo}" />
                            </p:column>
                            <p:column headerText="Descripcion::">
                                <h:outputText value="#{clase.descripcion}" />
                            </p:column>
                            <p:column headerText="MODIFICAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-pencil" title="Modificar" oncomplete="PF('dialogoModificar').show();" update=":formModificar">
                                    <f:setPropertyActionListener target="#{claseControl.clase}" value="#{clase}"/>
                                </p:commandButton>
                            </p:column>
                            <p:column headerText="ELIMINAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-trash" title="Eliminar" oncomplete="PF('dialogoEliminar').show();" update=":formEliminar">
                                    <f:setPropertyActionListener target="#{claseControl.clase}" value="#{clase}"/>
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </h:form>

                    <h:form id="formAgregar">
                        <p:dialog id="dlgAgregar" header="Agregar Clase" widgetVar="dialogoAgregar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Tipo:"/>
                                <p:inputText value="#{claseControl.clase.tipo}"/>
                                <p:outputLabel value="Descripcion:"/>
                                <p:inputText value="#{claseControl.clase.descripcion}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{claseControl.agregarClase()}" update=":formListado:tablaClases" oncomplete="PF('dialogoAgregar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoAgregar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formModificar">
                        <p:dialog id="dlgModificar" header="Modificar Clase" widgetVar="dialogoModificar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                               <p:outputLabel value="Tipo:"/>
                                <p:inputText value="#{claseControl.clase.tipo}"/>
                                <p:outputLabel value="Descripcion:"/>
                                <p:inputText value="#{claseControl.clase.descripcion}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{claseControl.modificarClase()}" update=":formListado:tablaClases" oncomplete="PF('dialogoModificar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoModificar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formEliminar">
                        <p:dialog id="dlgEliminar" header="Eliminar Clase" widgetVar="dialogoEliminar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <h:outputText value="Desea eliminar este registro?"/>
                            <p:commandButton  value="Si" actionListener="#{claseControl.eliminarClase()}" update=":formListado:tablaClases" oncomplete="PF('dialogoEliminar').hide();"/>
                            <p:commandButton  value="No" onclick="PF('dialogoEliminar').hide();"/>
                        </p:dialog>
                    </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
