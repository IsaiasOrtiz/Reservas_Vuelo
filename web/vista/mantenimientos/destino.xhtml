<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./../../plantilla/plantilla.xhtml">

            <ui:define name="content">
                <h3>LISTADO DE DESTINOS</h3>
                    <h:form>
                        <p:commandButton value="Agregar Destino" actionListener="#{destinoControl.limpiarDestino()}" oncomplete="PF('dialogoAgregar').show();" update=":formAgregar"/>
                        <p:separator/>
                    </h:form>
                    <h:form id="formListado">
                        <p:dataTable id="tablaDestinos" paginator="true" paginatorPosition="bottom" rows="10" var="destino" value="#{destinoControl.listaDestinos}" emptyMessage="No existen destinos">
                            <p:column headerText="Id:">
                                <h:outputText value="#{destino.idDestino}" />
                            </p:column>
                            <p:column headerText="Pais:">
                                <h:outputText value="#{destino.pais}" />
                            </p:column>
                              <p:column headerText="Ciudad:">
                                  <h:outputText value="#{destino.ciudad}" />
                            </p:column>
                              <p:column headerText="Aeropuerto:">
                                  <h:outputText value="#{destino.aeropuerto}" />
                            </p:column>
                            
                            <p:column headerText="MODIFICAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-pencil" title="Modificar" oncomplete="PF('dialogoModificar').show();" update=":formModificar">
                                    <f:setPropertyActionListener target="#{destinoControl.destino}" value="#{destino}"/>
                                </p:commandButton>
                            </p:column>
                            <p:column headerText="ELIMINAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-trash" title="Eliminar" oncomplete="PF('dialogoEliminar').show();" update=":formEliminar">
                                    <f:setPropertyActionListener target="#{destinoControl.destino}" value="#{destino}"/>
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </h:form>

                    <h:form id="formAgregar">
                        <p:dialog id="dlgAgregar" header="Agregar Destino" widgetVar="dialogoAgregar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Pais:"/>
                                <p:inputText value="#{destinoControl.destino.pais}"/>
                                <p:outputLabel value="Ciudad:"/>
                                <p:inputText value="#{destinoControl.destino.ciudad}"/>
                                <p:outputLabel value="Aeropuerto:"/>
                                <p:inputText value="#{destinoControl.destino.aeropuerto}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{destinoControl.agregarDestino()}" update=":formListado:tablaDestinos" oncomplete="PF('dialogoAgregar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoAgregar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formModificar">
                        <p:dialog id="dlgModificar" header="Modificar Destino" widgetVar="dialogoModificar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                               <p:outputLabel value="Pais:"/>
                                <p:inputText value="#{destinoControl.destino.pais}"/>
                                <p:outputLabel value="Ciudad:"/>
                                <p:inputText value="#{destinoControl.destino.ciudad}"/>
                                <p:outputLabel value="Aeropuerto:"/>
                                <p:inputText value="#{destinoControl.destino.aeropuerto}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{destinoControl.modificarDestino()}" update=":formListado:tablaDestinos" oncomplete="PF('dialogoModificar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoModificar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formEliminar">
                        <p:dialog id="dlgEliminar" header="Eliminar Destino" widgetVar="dialogoEliminar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <h:outputText value="Desea eliminar este registro?"/>
                            <p:commandButton  value="Si" actionListener="#{destinoControl.eliminarDestino()}" update=":formListado:tablaDestinos" oncomplete="PF('dialogoEliminar').hide();"/>
                            <p:commandButton  value="No" onclick="PF('dialogoEliminar').hide();"/>
                        </p:dialog>
                    </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
