<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>



        <ui:composition template="./../../plantilla/plantilla.xhtml">

            <ui:define name="content">
                <h3>LISTADO DE RESERVAS</h3>
                <h:form>
                    <p:commandButton value="Agregar Reserva" actionListener="#{reservaControl.limpiarReserva()}" oncomplete="PF('dialogoAgregar').show();" update=":formAgregar"/>
                    <p:separator/>
                </h:form>
                <h:form id="formListado">
                    <p:dataTable id="tablaReservas" paginator="true" paginatorPosition="bottom" rows="10" var="reserva" value="#{reservaControl.listaReservas}" emptyMessage="No existen reservas">
                        <p:column headerText="Id:">
                            <h:outputText value="#{reserva.idReserva}" />
                        </p:column>
                        <p:column headerText="Cliente">
                            <h:outputText value="#{reserva.cliente.nombre}" />
                        </p:column>
                        <p:column headerText="Clase:">
                            <h:outputText value="#{reserva.vueloClase.clase.descripcion}" />
                        </p:column>
                        <p:column headerText="Usuario">
                            <h:outputText value="#{reserva.usuario.nombreCompleto}" />
                        </p:column>
                        <p:column headerText="Cantidad de personas">
                            <h:outputText value="#{reserva.cantidadPersonas}" />
                        </p:column>
                        <p:column headerText="Forma de pago:">
                            <h:outputText value="#{reserva.formaPago}" />
                        </p:column>

                        <p:column headerText="Tipo reserva">
                            <h:outputText value="#{reserva.tipoReserva}" />
                        </p:column>

                        <p:column headerText="Fecha creacion:">
                            <h:outputText value="#{reserva.fechaCreacion}" />
                        </p:column>

                        <p:column headerText="MODIFICAR" style="text-align: center">
                            <p:commandButton icon="ui-icon-pencil" title="Modificar" oncomplete="PF('dialogoModificar').show();" update=":formModificar">
                                <f:setPropertyActionListener target="#{reservaControl.reserva}" value="#{reserva}"/>
                            </p:commandButton>
                        </p:column>
                        <p:column headerText="ELIMINAR" style="text-align: center">
                            <p:commandButton icon="ui-icon-trash" title="Eliminar" oncomplete="PF('dialogoEliminar').show();" update=":formEliminar">
                                <f:setPropertyActionListener target="#{reservaControl.reserva}" value="#{reserva}"/>
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </h:form>

                <h:form id="formAgregar">
                    <p:dialog id="dlgAgregar" header="Agregar Aerolinea" widgetVar="dialogoAgregar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                        <p:panelGrid columns="2" style="margin: 0 auto;">                                

                            <p:outputLabel value="Cliente:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.cliente.idCliente}">
                                <f:selectItem itemLabel="-- Seleccione -- "/>
                                <f:selectItems value="#{reservaControl.listaCliente}"/>
                            </p:selectOneMenu>
                            <p:outputLabel value="Clase:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.vueloClase.idVueloClase}">
                                <f:selectItem itemLabel="-- Seleccione -- "/>
                                <f:selectItems value="#{reservaControl.listaVueloUsuario}"/>
                            </p:selectOneMenu>   


                            <p:outputLabel value="Usuario:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.usuario.idUsuario}">

                                <f:selectItems value="#{reservaControl.listaUsuarios}"/>
                            </p:selectOneMenu>   

                            <p:outputLabel value="Cantidad de personas:"/>
                            <p:inputText value="#{reservaControl.reserva.cantidadPersonas}"/>

                            <p:outputLabel value="Forma Pago::"/>
                            <p:inputText value="#{reservaControl.reserva.formaPago}"/>

                            <p:outputLabel value="Tipo:"/>
                            <p:inputText value="#{reservaControl.reserva.tipoReserva}"/>

                            <p:outputLabel value="Fecha:"/>
                            <p:calendar value="#{reservaControl.reserva.fechaCreacion}" pattern="dd/MM/yyyy" locale="es" navigator="true" mask="true" yearRange="c:c+1"/>

                        </p:panelGrid>
                        <p:commandButton  value="Guardar" actionListener="#{reservaControl.agregarReserva()}" update=":formListado:tablaReservas" oncomplete="PF('dialogoAgregar').hide();"/>
                        <p:commandButton  value="Cancelar" onclick="PF('dialogoAgregar').hide();"/>
                    </p:dialog>
                </h:form>

                <h:form id="formModificar">
                    <p:dialog id="dlgModificar" header="Modificar Aerolinea" widgetVar="dialogoModificar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                        <p:panelGrid columns="2" style="margin: 0 auto;">                                
                            <p:outputLabel value="Id:"/>
                            <p:inputText value="#{reservaControl.reserva.idReserva}"/>
                            <p:outputLabel value="Cliente:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.cliente.idCliente}">
                                <f:selectItem itemLabel="-- Seleccione -- "/>
                                <f:selectItems value="#{reservaControl.listaCliente}"/>
                            </p:selectOneMenu>
                            <p:outputLabel value="Clase:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.vueloClase.idVueloClase}">
                                <f:selectItem itemLabel="-- Seleccione -- "/>
                                <f:selectItems value="#{reservaControl.listaVueloUsuario}"/>
                            </p:selectOneMenu>
                            <p:outputLabel value="Usuario:"/>
                            <p:selectOneMenu value="#{reservaControl.reserva.usuario.idUsuario}">

                                <f:selectItems value="#{reservaControl.listaUsuarios}"/>
                            </p:selectOneMenu>   

                            <p:outputLabel value="Cantidad de personas:"/>
                            <p:inputText value="#{reservaControl.reserva.cantidadPersonas}"/>

                            <p:outputLabel value="Forma Pago::"/>
                            <p:inputText value="#{reservaControl.reserva.formaPago}"/>

                            <p:outputLabel value="Tipo:"/>
                            <p:inputText value="#{reservaControl.reserva.tipoReserva}"/>

                            <p:outputLabel value="Fecha:"/>
                            <p:calendar value="#{reservaControl.reserva.fechaCreacion}" pattern="dd/MM/yyyy" locale="es" navigator="true" mask="true" yearRange="c:c+1"/>

                        </p:panelGrid>
                        <p:commandButton  value="Guardar" actionListener="#{reservaControl.modificarReserva()}" update=":formListado:tablaReservas" oncomplete="PF('dialogoModificar').hide();"/>
                        <p:commandButton  value="Cancelar" onclick="PF('dialogoModificar').hide();"/>
                    </p:dialog>
                </h:form>

                <h:form id="formEliminar">
                    <p:dialog id="dlgEliminar" header="Eliminar Usiarop" widgetVar="dialogoEliminar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                        <h:outputText value="Desea eliminar este registro?"/>
                        <p:commandButton  value="Si" actionListener="#{reservaControl.eliminarReserva()}" update=":formListado:tablaReservas" oncomplete="PF('dialogoEliminar').hide();"/>
                        <p:commandButton  value="No" onclick="PF('dialogoEliminar').hide();"/>
                    </p:dialog>
                </h:form>

            </ui:define>

        </ui:composition>
    </body>
</html>
