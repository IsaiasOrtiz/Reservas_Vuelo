<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Aerolinea</title>
    </h:head>
    <h:body>
        <h3>LISTADO DE AEROLINEAS</h3>
                    <h:form>
                        <p:commandButton value="Agregar Aerolinea" actionListener="#{aerolineaControl.limpiarAerolinea()}" oncomplete="PF('dialogoAgregar').show();" update=":formAgregar"/>
                        <p:separator/>
                    </h:form>
                    <h:form id="formListado">
                        <p:dataTable id="tablaAerolineas" paginator="true" paginatorPosition="bottom" rows="10" var="aerolinea" value="#{aerolineaControl.listaAerolineas}" emptyMessage="No existen aerolineas">
                            <p:column headerText="NOMBRE">
                                <h:outputText value="#{aerolinea.nombre}" />
                            </p:column>
                            <p:column headerText="TELEFONO">
                                <h:outputText value="#{aerolinea.telefono}" />
                            </p:column>
                            
                            <p:column headerText="MODIFICAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-pencil" title="Modificar" oncomplete="PF('dialogoModificar').show();" update=":formModificar">
                                    <f:setPropertyActionListener target="#{aerolineaControl.aerolinea}" value="#{aerolinea}"/>
                                </p:commandButton>
                            </p:column>
                            <p:column headerText="ELIMINAR" style="text-align: center">
                                <p:commandButton icon="ui-icon-trash" title="Eliminar" oncomplete="PF('dialogoEliminar').show();" update=":formEliminar">
                                    <f:setPropertyActionListener target="#{aerolineaControl.aerolinea}" value="#{aerolinea}"/>
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </h:form>

                    <h:form id="formAgregar">
                        <p:dialog id="dlgAgregar" header="Agregar Aerolinea" widgetVar="dialogoAgregar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Aerolinea:"/>
                                <p:inputText value="#{aerolineaControl.aerolinea.nombre}"/>
                                <p:outputLabel value="Telefono:"/>
                                <p:inputText value="#{aerolineaControl.aerolinea.telefono}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{aerolineaControl.agregarAerolinea()}" update=":formListado:tablaAerolineas" oncomplete="PF('dialogoAgregar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoAgregar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formModificar">
                        <p:dialog id="dlgModificar" header="Modificar Aerolinea" widgetVar="dialogoModificar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <p:panelGrid columns="2" style="margin: 0 auto;">                                
                                <p:outputLabel value="Aerolinea:"/>
                                <p:inputText value="#{aerolineaControl.aerolinea.nombre}"/>
                                <p:outputLabel value="Telefono:"/>
                                <p:inputText value="#{aerolineaControl.aerolinea.telefono}"/>
                            </p:panelGrid>
                            <p:commandButton  value="Guardar" actionListener="#{aerolineaControl.modificarAerolinea()}" update=":formListado:tablaAerolineas" oncomplete="PF('dialogoModificar').hide();"/>
                            <p:commandButton  value="Cancelar" onclick="PF('dialogoModificar').hide();"/>
                        </p:dialog>
                    </h:form>

                    <h:form id="formEliminar">
                        <p:dialog id="dlgEliminar" header="Eliminar Aerolinea" widgetVar="dialogoEliminar" resizable="false" showEffect="fade" hideEffect="explode" modal="true">
                            <h:outputText value="Desea eliminar este registro?"/>
                            <p:commandButton  value="Si" actionListener="#{aerolineaControl.eliminarAerolinea()}" update=":formListado:tablaAerolineas" oncomplete="PF('dialogoEliminar').hide();"/>
                            <p:commandButton  value="No" onclick="PF('dialogoEliminar').hide();"/>
                        </p:dialog>
                    </h:form>
    </h:body>
</html>
